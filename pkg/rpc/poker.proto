syntax = "proto3";

package poker;

option go_package = "grpc/pokerrpc";

// PokerService handles the actual poker game mechanics
service PokerService {
  // Game stream for real-time updates
  rpc StartGameStream(StartGameStreamRequest) returns (stream GameUpdate) {}
  
  // Card visibility management
  rpc ShowCards(ShowCardsRequest) returns (ShowCardsResponse) {}
  rpc HideCards(HideCardsRequest) returns (HideCardsResponse) {}

  // Player actions
  rpc MakeBet(MakeBetRequest) returns (MakeBetResponse) {}
  rpc CallBet(CallBetRequest) returns (CallBetResponse) {}
  rpc FoldBet(FoldBetRequest) returns (FoldBetResponse) {}
  rpc CheckBet(CheckBetRequest) returns (CheckBetResponse) {}
  
  // Game state
  rpc GetGameState(GetGameStateRequest) returns (GetGameStateResponse) {}
  
  // Hand evaluation
  rpc EvaluateHand(EvaluateHandRequest) returns (EvaluateHandResponse) {}
  // Returns the last completed showdown winners (cached), independent of current phase
  rpc GetLastWinners(GetLastWinnersRequest) returns (GetLastWinnersResponse) {}
}

// LobbyService handles table management and player connections
service LobbyService {
  // Table management
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse) {}
  rpc JoinTable(JoinTableRequest) returns (JoinTableResponse) {}
  rpc WatchTable(WatchTableRequest) returns (WatchTableResponse) {}
  rpc LeaveTable(LeaveTableRequest) returns (LeaveTableResponse) {}
  rpc UnwatchTable(UnwatchTableRequest) returns (UnwatchTableResponse) {}
  rpc GetTables(GetTablesRequest) returns (GetTablesResponse) {}
  rpc GetPlayerCurrentTable(GetPlayerCurrentTableRequest) returns (GetPlayerCurrentTableResponse) {}
  
  // Player management
  
  // Ready state management
  rpc SetPlayerReady(SetPlayerReadyRequest) returns (SetPlayerReadyResponse) {}
  rpc SetPlayerUnready(SetPlayerUnreadyRequest) returns (SetPlayerUnreadyResponse) {}
  
  // Notification stream
  rpc StartNotificationStream(StartNotificationStreamRequest) returns (stream Notification) {}
}

// AuthService handles user authentication and identity management
service AuthService {
  rpc RequestLoginCode (RequestLoginCodeRequest) returns (RequestLoginCodeResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
  rpc GetUserInfo (GetUserInfoRequest) returns (GetUserInfoResponse);
}

// Enums
enum GamePhase {
  WAITING = 0;
  NEW_HAND_DEALING = 1;
  PRE_FLOP = 2;
  FLOP = 3;
  TURN = 4;
  RIVER = 5;
  SHOWDOWN = 6;
}

// PlayerState captures the per-player state machine state.
enum PlayerState {
  PLAYER_STATE_UNINITIALIZED = 0;
  PLAYER_STATE_AT_TABLE = 1;
  PLAYER_STATE_IN_GAME  = 2;
  PLAYER_STATE_ALL_IN   = 3;
  PLAYER_STATE_FOLDED   = 4;
  PLAYER_STATE_LEFT     = 5;
}

enum NotificationType {
  UNKNOWN = 0;
  PLAYER_JOINED = 1;
  PLAYER_LEFT = 2;
  GAME_STARTED = 3;
  GAME_ENDED = 4;
  BET_MADE = 5;
  PLAYER_FOLDED = 6;
  NEW_ROUND = 7;
  SHOWDOWN_RESULT = 8;
  TIP_RECEIVED = 9;
  BALANCE_UPDATED = 10;
  TABLE_CREATED = 11;
  TABLE_REMOVED = 12;
  PLAYER_READY = 13;
  PLAYER_UNREADY = 14;
  ALL_PLAYERS_READY = 15;
  SMALL_BLIND_POSTED = 16;
  BIG_BLIND_POSTED = 17;
  CALL_MADE = 18;
  CHECK_MADE = 19;
  CARDS_SHOWN = 20;
  CARDS_HIDDEN = 21;
  NEW_HAND_STARTED = 22;
  PLAYER_ALL_IN = 23;
  // Connection and stream lifecycle (typed, non-UNKNOWN)
  NOTIFICATION_STREAM_CONNECTED = 24;
  NOTIFICATION_STREAM_DISCONNECTED = 25;
  GAME_STREAM_CONNECTED = 26;
  GAME_STREAM_DISCONNECTED = 27;
  ESCROW_FUNDING = 28; // escrow funding status update for owner only
  MESSAGE = 29; // generic informational message (e.g., settlement status)
  SETTLEMENT_BROADCAST = 30; // settlement transaction broadcasted
  PRESIGN_PENDING = 31; // presigning required before game can start
  GAME_STATE_UPDATED = 32; // game state synchronization event (for state updates, not notifications)
  PLAYER_LOST = 33; // player removed from table due to 0 chips after losing
}

enum HandRank {
  HIGH_CARD = 0;
  PAIR = 1;
  TWO_PAIR = 2;
  THREE_OF_A_KIND = 3;
  STRAIGHT = 4;
  FLUSH = 5;
  FULL_HOUSE = 6;
  FOUR_OF_A_KIND = 7;
  STRAIGHT_FLUSH = 8;
  ROYAL_FLUSH = 9;
}

// Game Messages
message StartGameStreamRequest {
  string player_id = 1;
  string table_id = 2;
}

message GameUpdate {
  string table_id = 1;
  GamePhase phase = 2;
  repeated Player players = 3;
  repeated Card community_cards = 4;
  int64 pot = 5;           // Total poker chips in the pot
  int64 current_bet = 6;   // Current poker chips bet amount in this round
  string current_player = 7;
  int64 min_raise = 8;     // Minimum poker chips raise amount
  int64 max_raise = 9;     // Maximum poker chips raise amount
  bool game_started = 10;
  int32 players_required = 11;
  int32 players_joined = 12;
  string phase_name = 13;  // Human-readable name of the current phase
  int32 time_bank_seconds = 14;       // Timebank per player (seconds)
  int64 turn_deadline_unix_ms = 15;   // Absolute deadline for current turn (Unix ms). 0 if N/A
  int64 small_blind = 16;   // Current table small blind (chips)
  int64 big_blind = 17;     // Current table big blind (chips)
  int32 blind_level = 18;   // Current blind level index (0-based)
  int64 next_blind_increase_unix_ms = 19; // Unix ms timestamp of next blind increase (0 if disabled/max)
}

message MakeBetRequest {
  string player_id = 1;
  string table_id = 2;
  int64 amount = 3;  // Poker chips amount to bet
}

message MakeBetResponse {
  bool success = 1;
  string message = 2;
  int64 new_balance = 3; // Player's new DCR account balance (in atoms)
}

message FoldBetRequest {
  string player_id = 1;
  string table_id = 2;
}

message FoldBetResponse {
  bool success = 1;
  string message = 2;
}

message CheckBetRequest {
  string player_id = 1;
  string table_id = 2;
}

message CheckBetResponse {
  bool success = 1;
  string message = 2;
}

message CallBetRequest {
  string player_id = 1;
  string table_id = 2;
}

message CallBetResponse {
  bool success = 1;
  string message = 2;
}

message GetGameStateRequest {
  string table_id = 1;
  string player_id = 2;
}

message GetGameStateResponse {
  GameUpdate game_state = 1;
}

message EvaluateHandRequest {
  repeated Card cards = 1;
}

message EvaluateHandResponse {
  HandRank rank = 1;
  string description = 2;
  repeated Card best_hand = 3;
}

message GetLastWinnersRequest {
  string table_id = 1;
}

message GetLastWinnersResponse {
  repeated Winner winners = 1;
}

message Winner {
  string player_id = 1;
  HandRank hand_rank = 2;
  repeated Card best_hand = 3;
  int64 winnings = 4;
}

// Lobby Messages
message CreateTableRequest {
  string player_id = 1;
  int64 small_blind = 2;    // Poker chips amount for small blind
  int64 big_blind = 3;      // Poker chips amount for big blind
  int32 max_players = 4;
  int32 min_players = 5;
  int64 buy_in = 6;         // DCR amount to join table (in atoms)
  int64 starting_chips = 7; // Poker chips each player starts with
  int32 time_bank_seconds = 8; // Player timeout in seconds (default: 30)
  int32 auto_start_ms = 9; // Auto-start delay between hands in ms (0 = disabled)
  int32 auto_advance_ms = 10; // Auto-advance delay between streets when all-in in ms (must be > 0)
  string name = 11;
  int32 blind_increase_interval_sec = 12; // Blind increase interval in seconds (0 = disabled)
}

message CreateTableResponse {
  string table_id = 1;
  string message = 2;
}

message JoinTableRequest {
  string player_id = 1;
  string table_id = 2;
}

message JoinTableResponse {
  bool success = 1;
  string message = 2;
}

message WatchTableRequest {
  string player_id = 1;
  string table_id = 2;
}

message WatchTableResponse {
  bool success = 1;
  string message = 2;
}

message LeaveTableRequest {
  string player_id = 1;
  string table_id = 2;
}

message LeaveTableResponse {
  bool success = 1;
  string message = 2;
}

message UnwatchTableRequest {
  string player_id = 1;
  string table_id = 2;
}

message UnwatchTableResponse {
  bool success = 1;
  string message = 2;
}

message GetTablesRequest {}

message GetTablesResponse {
  repeated Table tables = 1;
}

message Table {
  string id = 1;
  string name = 2;
  repeated Player players = 3;
  int64 small_blind = 4;     // Poker chips amount for small blind
  int64 big_blind = 5;       // Poker chips amount for big blind
  int32 max_players = 6;
  int32 min_players = 7;
  int32 current_players = 8;
  int64 buy_in = 9;         // DCR amount to join table (in atoms)
  GamePhase phase = 10;
  bool all_players_ready = 11;
  bool game_started = 12;
  int32 blind_increase_interval_sec = 13; // Blind increase interval in seconds (0 = disabled)
}

message GetBalanceRequest {
  string player_id = 1;
}

message GetBalanceResponse {
  int64 balance = 1; // DCR account balance (in atoms)
}

message UpdateBalanceRequest {
  string player_id = 1;
  int64 amount = 2;      // DCR amount to add/subtract (in atoms, can be negative)
  string description = 3;
}

message UpdateBalanceResponse {
  int64 new_balance = 1; // New DCR account balance (in atoms)
  string message = 2;
}

message ProcessTipRequest {
  string from_player_id = 1;
  string to_player_id = 2;
  int64 amount = 3;    // DCR amount to tip (in atoms)
  string message = 4;
}

message ProcessTipResponse {
  bool success = 1;
  string message = 2;
  int64 new_balance = 3; // Recipient's new DCR account balance (in atoms)
}

message StartNotificationStreamRequest {
  string player_id = 1;
}

message Notification {
  NotificationType type = 1;
  string message = 2;
  string table_id = 3;
  string player_id = 4;
  int64 amount = 5;
  repeated Card cards = 6;
  HandRank hand_rank = 7;
  int64 new_balance = 8;
  Table table = 9;
  bool ready = 10;
  bool started = 11;
  bool game_ready_to_play = 12;
  int32 countdown = 13;
  repeated Winner winners = 14;
  Showdown showdown = 15;
  // Settlement fields for GAME_ENDED notifications
  string winner_id = 16;    // Player ID of the game winner
  int32 winner_seat = 17;   // Seat index of winner (branch for finalization)
  string match_id = 18;     // Match ID for referee settlement (table_id|session_id)
  bool is_winner = 19;      // True if recipient is the winner (personalized per player)
}

message ShowdownPlayer {
  string player_id = 1;
  repeated Card hole_cards = 2;
  PlayerState final_state = 3; // PLAYER_STATE_FOLDED / IN_GAME / ALL_IN
  HandRank hand_rank = 4;
  repeated Card best_hand = 5;
  int64 contribution = 6; // Total chips contributed this hand
  string name = 7; // Player nickname (for showdown display)
}

message Showdown {
  repeated Winner winners = 1;
  int64 pot = 2;
  repeated Card board = 3; // Community cards snapshot at showdown
  repeated ShowdownPlayer players = 4; // Per-player showdown snapshot (hole cards + state)
  string hand_id = 5; // Unique hand identifier for this showdown
  int32 round = 6; // Game round number when this showdown occurred
}

// Common Messages
message Player {
  string id = 1;
  string name = 2;
  int64 balance = 3;      // Poker chips balance (in-game currency)
  repeated Card hand = 4;
  int64 current_bet = 5;  // Current poker chips bet in this round
  bool folded = 6;
  bool is_turn = 7;
  bool is_all_in = 8;
  bool is_dealer = 9;
  bool is_ready = 10;
  string hand_description = 11; // Hand evaluation description (available during showdown)
  PlayerState player_state = 12; // Canonical player state (enum)
  bool is_small_blind = 13; // True if this player is the small blind for current hand
  bool is_big_blind = 14;   // True if this player is the big blind for current hand
  bool is_disconnected = 15; // True if the player is disconnected but seat is reserved
  string escrow_id = 16;     // Bound escrow ID, if any
  bool escrow_ready = 17;    // True when escrow funding is single-UTXO and valid
  int32 table_seat = 18;     // The seat index (0-based) where this player is seated
  bool presign_complete = 19; // True when settlement presigning is complete for this player
  bool cards_revealed = 20; // True when the player has chosen to reveal cards at showdown
}

message Card {
  string suit = 1;
  string value = 2;
}

message SetPlayerReadyRequest {
  string player_id = 1;
  string table_id = 2;
}

message SetPlayerReadyResponse {
  bool success = 1;
  string message = 2;
  bool all_players_ready = 3;
}

message SetPlayerUnreadyRequest {
  string player_id = 1;
  string table_id = 2;
}

message SetPlayerUnreadyResponse {
  bool success = 1;
  string message = 2;
}

message GetPlayerCurrentTableRequest {
  string player_id = 1;
}

message GetPlayerCurrentTableResponse {
  string table_id = 1;
}

message ShowCardsRequest {
  string player_id = 1;
  string table_id = 2;
}

message ShowCardsResponse {
  bool success = 1;
  string message = 2;
}

message HideCardsRequest {
  string player_id = 1;
  string table_id = 2;
}

message HideCardsResponse {
  bool success = 1;
  string message = 2;
}

// Auth Messages
message RegisterRequest {
  string nickname = 1;
  string user_id = 2;  // Derived from seed key
}

message RegisterResponse {
  bool ok = 1;
  string error = 2;  // Empty if ok == true
}

message LoginRequest {
  string nickname = 1;
  string user_id = 2;  // Derived from seed key
  string address = 3;  // P2PKH address to verify control of
  string signature = 4; // Decred signed message over `address` (base64-encoded compact sig)
  string code = 5;      // Optional server-provided nonce; signature is over this when set
}

message RequestLoginCodeRequest {
  string user_id = 1;  // Optional: lets server return address hint for this user
}

message RequestLoginCodeResponse {
  string code = 1;
  int64 ttl_sec = 2;
  string address_hint = 3;
}

message LoginResponse {
  bool ok = 1;
  string error = 2;
  string token = 3;     // Session token
  string user_id = 4;
  string nickname = 5;
  string payout_address = 6; // Verified payout address bound to this session
}

message LogoutRequest {
  string token = 1;
}

message LogoutResponse {
  bool ok = 1;
}

message GetUserInfoRequest {
  string token = 1;
}

message GetUserInfoResponse {
  string user_id = 1;
  string nickname = 2;
  int64 created = 3;
  int64 last_login = 4;
  string payout_address = 5;
}
