import java.io.FileInputStream
import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasReleaseSigning = keystorePropertiesFile.exists()
def releaseStoreFile = null

if (hasReleaseSigning) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    def configuredStoreFile = keystoreProperties["storeFile"]
    if (configuredStoreFile) {
        releaseStoreFile = new File(keystorePropertiesFile.parentFile, configuredStoreFile).canonicalFile
    }
}

android {
    namespace = "com.dcrpoker"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.dcrpoker"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = releaseStoreFile
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}

gradle.taskGraph.whenReady { taskGraph ->
    def wantsRelease = taskGraph.allTasks.any { task ->
        def name = task.name.toLowerCase()
        name.contains("release")
    }

    if (wantsRelease && !hasReleaseSigning) {
        throw new GradleException(
            "Missing android/key.properties for release signing. " +
            "Copy android/key.properties.example to android/key.properties " +
            "and set your keystore values."
        )
    }
}
