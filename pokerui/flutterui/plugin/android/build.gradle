plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

group 'com.dcrpoker.golib_plugin'
version '1.0-SNAPSHOT'

android {
    namespace "com.dcrpoker.golib_plugin"
    compileSdkVersion 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    defaultConfig {
        minSdkVersion 16
    }
}

dependencies {
    def golibProject = findProject(':golib') ?: findProject(':golib_plugin:golib')
    if (golibProject == null) {
        throw new GradleException(
            "Project ':golib' was not found. " +
            "Ensure android/settings.gradle includes '../../plugin/android/golib'."
        )
    }
    api golibProject
}
